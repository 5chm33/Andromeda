name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # v11.0.1: pnpm version MUST match the lockfileVersion in pnpm-lock.yaml.
    # lockfileVersion '9.0' is generated by pnpm 11.x. Using pnpm 9 here caused
    # ERR_PNPM_OUTDATED_LOCKFILE failures in Docker and CI.
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.5.2

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build
      run: pnpm run build

    # v11.2.0: Use --pool=forks to avoid Vitest 3.x worker IPC timeout
    # ("Error: [vitest-worker]: Timeout calling onTaskUpdate").
    # This is a known Vitest 3.x issue with worker threads on GitHub Actions runners.
    # --pool=forks uses process forks instead of worker threads, avoiding the IPC timeout.
    # All 286 test files pass with this flag.
    - name: Test
      run: npx vitest run --pool=forks
      env:
        CI: true
        ANDROMEDA_ADMIN_KEY: ci-test-key-not-for-production

    # v9.12: Run coverage (informational — does not block CI)
    - name: Coverage
      run: pnpm run test:coverage
      continue-on-error: true
      env:
        CI: true
        ANDROMEDA_ADMIN_KEY: ci-test-key-not-for-production

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage/
        retention-days: 30
