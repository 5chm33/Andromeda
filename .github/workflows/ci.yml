name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build
      run: pnpm run build

    # v6.25: Run full test suite on every push/PR — catches RSI regressions before they ship
    - name: Test
      run: pnpm run test
      env:
        CI: true
        # Provide a dummy admin key so auth-protected tests can run in CI
        ANDROMEDA_ADMIN_KEY: ci-test-key-not-for-production

    # v9.12: Enforce coverage thresholds (80% lines/functions/statements, 70% branches)
    - name: Coverage
      run: pnpm run test:coverage
      env:
        CI: true
        ANDROMEDA_ADMIN_KEY: ci-test-key-not-for-production

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage/
        retention-days: 30
