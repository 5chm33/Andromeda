# deploy.yml — v6.37
#
# Auto-deploy to production on every push to main that passes CI.
#
# Deployment strategy:
#   1. Build Docker image
#   2. Push to GitHub Container Registry (ghcr.io)
#   3. Trigger rolling update via kubectl (or SSH deploy script)
#
# Required GitHub Secrets:
#   GHCR_TOKEN         — GitHub Personal Access Token with packages:write
#   DEPLOY_HOST        — SSH host for production server (or k8s cluster)
#   DEPLOY_USER        — SSH user
#   DEPLOY_SSH_KEY     — SSH private key
#   KUBECONFIG_BASE64  — base64-encoded kubeconfig (for k8s deploy)
#
# The deploy step is conditional: if KUBECONFIG_BASE64 is set, it does a
# kubectl rolling update; otherwise it SSH-deploys via docker-compose.

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

# Only run one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Wait for CI to pass ──────────────────────────────────────────────────────
  ci-check:
    name: Verify CI passed
    uses: ./.github/workflows/rsi-validate.yml
    # This job inherits the CI workflow — deploy only runs if CI passes

  # ── Build and push Docker image ──────────────────────────────────────────────
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: []  # run in parallel with ci-check, gated by deploy job
    timeout-minutes: 20
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Option A: Kubernetes rolling update ──────────────────────────────────
      - name: Deploy to Kubernetes
        if: ${{ secrets.KUBECONFIG_BASE64 != '' }}
        run: |
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl set image deployment/andromeda \
            andromeda=ghcr.io/${{ github.repository }}:sha-${{ github.sha }} \
            --namespace=default
          kubectl rollout status deployment/andromeda --namespace=default --timeout=5m
          echo "Kubernetes deploy complete"

      # ── Option B: SSH + docker-compose ───────────────────────────────────────
      - name: Deploy via SSH (docker-compose)
        if: ${{ secrets.KUBECONFIG_BASE64 == '' && secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/andromeda
            docker pull ghcr.io/${{ github.repository }}:latest
            docker-compose up -d --no-deps --build andromeda
            docker-compose ps
            echo "SSH deploy complete"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ghcr.io/${{ github.repository }}:sha-${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
