# Andromeda — Production Deploy Workflow
#
# Builds a Docker image and deploys to production on every push to main.
# Supports two deploy strategies (auto-detected by which secrets are set):
#   A) Kubernetes rolling update  — set KUBECONFIG_BASE64 secret
#   B) SSH + docker-compose       — set DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
#
# Required GitHub Secrets (set whichever strategy you use):
#   GHCR_TOKEN         — GitHub PAT with packages:write (optional, falls back to GITHUB_TOKEN)
#   KUBECONFIG_BASE64  — base64-encoded kubeconfig (for k8s deploy)
#   DEPLOY_HOST        — SSH host for production server
#   DEPLOY_USER        — SSH user
#   DEPLOY_SSH_KEY     — SSH private key
#
# If neither KUBECONFIG_BASE64 nor DEPLOY_HOST is set, the deploy step is
# skipped and only the Docker image build/push runs (if a Dockerfile exists).

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only run one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Build and push Docker image ──────────────────────────────────────────────
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run if a Dockerfile exists — skip silently for non-containerized installs
    if: ${{ hashFiles('Dockerfile') != '' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    timeout-minutes: 10
    environment: production
    if: ${{ needs.build-and-push.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Option A: Kubernetes rolling update ──────────────────────────────────
      # Uses env var to avoid invalid secrets comparison in if: expressions
      - name: Deploy to Kubernetes
        if: ${{ env.KUBECONFIG_BASE64 != '' }}
        env:
          KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
        run: |
          echo "$KUBECONFIG_BASE64" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl set image deployment/andromeda \
            andromeda=ghcr.io/${{ github.repository }}:sha-${{ github.sha }} \
            --namespace=default
          kubectl rollout status deployment/andromeda --namespace=default --timeout=5m
          echo "Kubernetes deploy complete"

      # ── Option B: SSH + docker-compose ───────────────────────────────────────
      - name: Deploy via SSH (docker-compose)
        if: ${{ env.KUBECONFIG_BASE64 == '' && env.DEPLOY_HOST != '' }}
        env:
          KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/andromeda
            docker pull ghcr.io/${{ github.repository }}:latest
            docker-compose up -d --no-deps --build andromeda
            docker-compose ps
            echo "SSH deploy complete"

      # ── No secrets configured — informational only ────────────────────────────
      - name: No deploy secrets configured
        if: ${{ env.KUBECONFIG_BASE64 == '' && env.DEPLOY_HOST == '' }}
        env:
          KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          echo "No KUBECONFIG_BASE64 or DEPLOY_HOST secret configured."
          echo "Docker image was built and pushed to GHCR. Deploy manually when ready."
          echo "Image: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ghcr.io/${{ github.repository }}:sha-${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
