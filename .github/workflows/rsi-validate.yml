# rsi-validate.yml — v6.36
#
# Mirrors the 4-stage ciPipeline.ts pipeline as a GitHub Actions workflow.
# Runs on every push to master/main and on every pull request.
#
# Stages:
#   1. typecheck  — tsc --noEmit (informational — pre-existing errors don't block)
#   2. test       — pnpm test --run (vitest)
#   3. build      — pnpm run build (vite + tsc emit) — authoritative build check
#   4. smoke      — start server, hit /health, shut down
#
# RSI-applied commits are validated here before they can be merged.

name: RSI Validate

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: rsi-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: RSI 4-Stage Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node / pnpm setup ─────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # --no-frozen-lockfile prevents ERR_PNPM_LOCKFILE_CONFIG_MISMATCH when
      # pnpm-workspace.yaml and package.json pnpm-field are out of sync across versions.
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ── Stage 1: TypeScript type-check ────────────────────────────────────────
      # continue-on-error: true — the codebase has pre-existing type errors that
      # don't affect the Vite build. Stage 3 (build) is the authoritative check.
      # This stage is informational: it reports the error count without blocking.
      - name: Stage 1 — TypeScript typecheck (informational)
        run: |
          pnpm exec tsc --noEmit 2>&1 | tee /tmp/tsc-output.txt || true
          ERROR_COUNT=$(grep -c 'error TS' /tmp/tsc-output.txt 2>/dev/null || echo 0)
          echo "TypeScript errors: $ERROR_COUNT"
          echo "## TypeScript Typecheck" >> $GITHUB_STEP_SUMMARY
          echo "Pre-existing errors: $ERROR_COUNT (informational — does not block CI)" >> $GITHUB_STEP_SUMMARY
        env:
          NODE_ENV: test

      # ── Stage 2: Test suite ───────────────────────────────────────────────────
      - name: Stage 2 — Test suite
        run: pnpm test --run
        env:
          NODE_ENV: test
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'test-stub' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'test-stub' }}

      # ── Stage 3: Build ────────────────────────────────────────────────────────
      - name: Stage 3 — Build
        run: pnpm run build
        env:
          NODE_ENV: production

      # ── Stage 4: Smoke test ───────────────────────────────────────────────────
      - name: Stage 4 — Smoke test (start server + /health)
        run: |
          node dist/index.js &
          SERVER_PID=$!
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
          kill $SERVER_PID 2>/dev/null || true
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED: /health returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test PASSED: /health returned HTTP 200"
        env:
          NODE_ENV: production
          PORT: 3000
          AUTONOMY: "false"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'test-stub' }}

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Pipeline summary
        if: always()
        run: |
          echo "## RSI Validation Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript typecheck (informational) | see above |" >> $GITHUB_STEP_SUMMARY
          echo "| Test suite | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke test | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
