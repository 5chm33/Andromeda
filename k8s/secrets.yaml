# ─── Andromeda v6.37 — Kubernetes Secrets Template ───────────────────────────
#
# DO NOT commit real values to git. Use kubectl create secret or a secrets manager.
#
# Create secrets with:
#   kubectl create secret generic andromeda-secrets \
#     --from-literal=DEEPSEEK_API_KEY=sk-... \
#     --from-literal=JWT_SECRET=$(openssl rand -base64 32) \
#     --from-literal=DATABASE_URL=mysql://user:pass@host:3306/andromeda \
#     --from-literal=REDIS_URL=redis://user:pass@host:6379 \
#     --from-literal=POSTGRES_URL=postgres://user:pass@host:5432/andromeda
#
# Or use this template (base64-encode your values):
#   echo -n "your-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: andromeda-secrets
  namespace: default
type: Opaque
data:
  DEEPSEEK_API_KEY: <base64-encoded-value>
  JWT_SECRET: <base64-encoded-value>
  DATABASE_URL: <base64-encoded-value>
  REDIS_URL: <base64-encoded-value>
  POSTGRES_URL: <base64-encoded-value>
  BRAVE_SEARCH_API_KEY: <base64-encoded-value>
