packages:
  - '.'
# allowBuilds: Approve build scripts for native addons (pnpm 11+).
# Uses package NAME (not version) so it covers ALL versions including transitive
# deps like esbuild@0.18.x and esbuild@0.21.x pulled in by vite/rollup.
# IMPORTANT: This file is protected in andromeda-constitution.json —
# the RSI system must NOT modify it.
allowBuilds:
  '@tailwindcss/oxide': true
  better-sqlite3: true
  canvas: true
  electron-winstaller: true
  esbuild: true
  node-pty: true
patchedDependencies:
  wouter@3.7.1: patches/wouter@3.7.1.patch
overrides:
  fast-xml-parser: '>=5.3.5'
  path-to-regexp@0.1.12: '0.1.13'
  esbuild: '>=0.28.1'
minimumReleaseAgeExclude:
  - esbuild@0.24.3
  - vite@7.1.11 || 7.3.2 || 7.3.5
  - '@trpc/server@11.8.0'
  - pnpm@10.26.0 || 10.27.0 || 10.28.1 || 10.28.2
  - '@smithy/config-resolver@4.4.0'
  - tar@7.5.3 || 7.5.4 || 7.5.7 || 7.5.8 || 7.5.10 || 7.5.11 || 7.5.16
  - mdast-util-to-hast@13.2.1
  - qs@6.14.1 || 6.14.2 || 6.15.2
  - rollup@4.59.0
  - express-rate-limit@8.2.2
  - picomatch@4.0.4
  - dompurify@3.3.2 || 3.3.4 || 3.4.0 || 3.4.6 || 3.4.7 || 3.4.8 || 3.4.9 || 3.4.11
  - lodash-es@4.17.23 || 4.17.24
  - lodash@4.17.23 || 4.17.24
  - follow-redirects@1.15.12
  - axios@1.13.5 || 1.15.0 || 1.15.1 || 1.15.2 || 1.16.0
  - postcss@8.5.10
  - ip-address@10.1.1
  - uuid@11.1.1
  - mermaid@11.14.1
  - form-data@4.0.6
  - '@babel/core@7.29.1'
  - undici@7.28.0
