packages:
  - '.'

# Only these packages are allowed to run build scripts (native addons).
# canvas is in optionalDependencies and intentionally excluded here —
# it requires native build tools that may not be available on all platforms.
onlyBuiltDependencies:
  - esbuild
  - '@tailwindcss/oxide'
  - better-sqlite3
  - node-pty
patchedDependencies:
  wouter@3.7.1: patches/wouter@3.7.1.patch
